name: XPT Fuzz

on:
  workflow_dispatch:
  schedule:
    - cron: "37 3 * * 1"

jobs:
  xpt-fuzz:
    name: XPT parser short fuzz
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Verify XPT fuzz seed corpus
        run: |
          required_seeds=(
            character_dataset_seed
            ibm_float_seed
            library_header_seed
            namestr_header_seed
            numeric_payload_seed
            observation_padding_seed
            validish_transport_headers_seed
          )
          for seed in "${required_seeds[@]}"; do
            test -s "fuzz/corpus/xpt_parser/${seed}"
          done
          oversized="$(find fuzz/corpus/xpt_parser -type f ! -name README.md -size +64k -print -quit)"
          if [ -n "${oversized}" ]; then
            echo "XPT fuzz seed is too large: ${oversized}"
            exit 1
          fi

      - name: Run XPT parser fuzz target
        run: |
          cd fuzz
          mkdir -p artifacts
          cargo +nightly fuzz run xpt_parser corpus/xpt_parser -- -max_total_time=60 -artifact_prefix=artifacts/

      - name: Upload fuzz artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: xpt-fuzz-artifacts
          path: fuzz/artifacts
