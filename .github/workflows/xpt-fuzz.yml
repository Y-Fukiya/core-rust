name: XPT Fuzz

on:
  workflow_dispatch:
  schedule:
    - cron: "37 3 * * 1"

jobs:
  xpt-fuzz:
    name: XPT parser short fuzz
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-fuzz
        run: cargo install cargo-fuzz --locked

      - name: Run XPT parser fuzz target
        run: |
          cd fuzz
          mkdir -p artifacts
          cargo fuzz run xpt_parser corpus/xpt_parser -- -max_total_time=60 -artifact_prefix=artifacts/

      - name: Upload fuzz artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xpt-fuzz-artifacts
          path: fuzz/artifacts
