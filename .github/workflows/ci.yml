name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  python:
    name: Python
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install package
        run: python -m pip install -e ".[test]"

      - name: Compile Python
        run: PYTHONDONTWRITEBYTECODE=1 python -B -m compileall -q src tests

      - name: Test Python
        run: PYTHONDONTWRITEBYTECODE=1 python -B -m pytest -p no:cacheprovider -q

  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@1.93.1
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Check
        run: cargo check --workspace --locked

      - name: Clippy
        run: cargo clippy --workspace --locked -- -D warnings

      - name: Test
        run: cargo test --workspace --locked

      - name: Open Rules curated fixture oracle
        run: |
          cargo run -p xtask -- open-rules run-score \
            --open-rules-root tests/fixtures/open_rules_executable \
            --core-rs-results-root target/open-rules-core-rs-fixture \
            --out target/open-rules-scoreboard-fixture \
            --min-coverage 1.0 \
            --max-skipped-unsupported 0
          cargo run -p xtask -- open-rules baseline \
            --scoreboard target/open-rules-scoreboard-fixture/scoreboard.json \
            --baseline tests/open_rules/baseline.json

      - name: Checkout pinned cdisc-open-rules for curated subset
        run: |
          upstream_repo="$(sed -n 's/^repo=//p' tests/open_rules/upstream.lock)"
          upstream_sha="$(sed -n 's/^sha=//p' tests/open_rules/upstream.lock)"
          git clone "$upstream_repo" ../cdisc-open-rules
          git -C ../cdisc-open-rules checkout "$upstream_sha"

      - name: Open Rules curated upstream subset oracle
        run: |
          mkdir -p ../cdisc-open-rules-curated/Published
          grep -Ev '^[[:space:]]*(#|$)' tests/open_rules/curated-upstream-rules.txt | while read -r rule_id; do
            cp -R "../cdisc-open-rules/Published/${rule_id}" ../cdisc-open-rules-curated/Published/
          done
          cargo run -p xtask -- open-rules run-score \
            --open-rules-root ../cdisc-open-rules-curated \
            --core-rs-results-root target/open-rules-core-rs-curated-upstream \
            --out target/open-rules-scoreboard-curated-upstream \
            --min-coverage 1.0 \
            --max-skipped-unsupported 0
          cargo run -p xtask -- open-rules baseline \
            --scoreboard target/open-rules-scoreboard-curated-upstream/scoreboard.json \
            --baseline tests/open_rules/curated-upstream-baseline.json

      - name: Open Rules curated gap subset oracle
        run: |
          mkdir -p ../cdisc-open-rules-curated-gap/Published
          grep -Ev '^[[:space:]]*(#|$)' tests/open_rules/curated-gap-rules.txt | while read -r rule_id; do
            cp -R "../cdisc-open-rules/Published/${rule_id}" ../cdisc-open-rules-curated-gap/Published/
          done
          cargo run -p xtask -- open-rules run-score \
            --open-rules-root ../cdisc-open-rules-curated-gap \
            --core-rs-results-root target/open-rules-core-rs-curated-gap \
            --out target/open-rules-scoreboard-curated-gap
          cargo run -p xtask -- open-rules baseline \
            --scoreboard target/open-rules-scoreboard-curated-gap/scoreboard.json \
            --baseline tests/open_rules/curated-gap-baseline.json
